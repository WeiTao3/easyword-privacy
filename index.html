<!DOCTYPE html>                                                                                                                                 
  <html lang="en">                                          
  <head>                                                                                                                                          
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">                                                                        
    <title>EasyWord Privacy Policy</title>                  
    <style>
      body { font-family: -apple-system, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 24px; line-height: 1.7; color: #222; }
      h1 { font-size: 28px; } h2 { font-size: 18px; margin-top: 32px; }                                                                           
      table { border-collapse: collapse; width: 100%; } td, th { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }                   
    </style>                                                                                                                                      
  </head>                                                                                                                                         
  <body>                                                                                                                                          
    <div id="content"></div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>                                                                     
    <script>
      fetch('privacy.md')                                                                                                                         
        .then(r => r.text())                                                                                                                      
        .then(text => document.getElementById('content').innerHTML = marked.parse(text));
    </script>
  </body>                                                                                                                                         
  </html>
